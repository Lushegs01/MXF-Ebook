<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="110 80 280 330" fill="none">
  <!-- MAXFIT — Home Fitness Service -->

  <!-- Framing arcs -->
  <path d="M317.7,138.3 A118,118 0 0 1 317.7,331.7" stroke="#3AAAB0" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M182.3,331.7 A118,118 0 0 1 182.3,138.3" stroke="#3AAAB0" stroke-width="3.5" stroke-linecap="round"/>

  <!-- House roof + chimney -->
  <path d="M150,190 L250,96 L350,190" stroke="#138086" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M305,148 L305,112 L324,112" stroke="#138086" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Figure: front double-biceps flex -->
  <g fill="#F26F21">
    <!-- arms (thick rounded strokes) -->
    <path d="M202,210 L162,170 L200,140" stroke="#F26F21" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M298,210 L338,170 L300,140" stroke="#F26F21" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- bicep bulges + fists -->
    <circle cx="186" cy="190" r="17"/>
    <circle cx="314" cy="190" r="17"/>
    <circle cx="200" cy="140" r="15"/>
    <circle cx="300" cy="140" r="15"/>
    <!-- head + neck -->
    <circle cx="250" cy="170" r="25"/>
    <rect x="237" y="188" width="26" height="22" rx="5"/>
    <!-- torso (V-taper with pecs) -->
    <path d="M212,206 C228,198 238,197 250,197 C262,197 272,198 288,206 L282,256 L268,312 L232,312 L218,256 Z"/>
  </g>

  <!-- muscle definition -->
  <g stroke="#C9551A" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M250,208 L250,236"/>
    <path d="M224,226 Q237,238 250,233"/>
    <path d="M276,226 Q263,238 250,233"/>
    <path d="M250,242 L250,300"/>
    <path d="M250,260 L235,258 M250,260 L265,258"/>
    <path d="M250,280 L237,278 M250,280 L263,278"/>
  </g>

  <!-- MAXFIT wordmark -->
  <text x="251" y="351" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="47" letter-spacing="6" fill="#F26F21">MAXFIT</text>

  <!-- tagline -->
  <g fill="#2A9AA0">
    <path d="M120,368 L137,368 M363,368 L380,368" stroke="#2A9AA0" stroke-width="2" stroke-linecap="round"/>
    <rect x="139" y="364.5" width="7" height="7" transform="rotate(45 142.5 368)"/>
    <rect x="354" y="364.5" width="7" height="7" transform="rotate(45 357.5 368)"/>
    <text x="250" y="373" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="13" letter-spacing="2" fill="#2A9AA0">HOME FITNESS SERVICE</text>
  </g>
</svg>
